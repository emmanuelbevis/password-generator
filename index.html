<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de mot de passe</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #252545;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  h1 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  input[type="range"] {
    width: 100%;
  }

  .result {
    margin: 15px 0;
    padding: 10px;
    background: #111;
    border-radius: 5px;
    word-break: break-all;
  }

  button {
    background: #c9a96e;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
  }

  button:hover {
    background: #b08f55;
  }

  .options {
    text-align: left;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🔐 Générateur de mot de passe</h1>

  <div class="result" id="password">Clique sur générer</div>

  <label>Longueur: <span id="lengthValue">12</span></label>
  <input type="range" min="6" max="30" value="12" id="length">

  <div class="options">
    <label><input type="checkbox" id="uppercase" checked> Majuscules</label><br>
    <label><input type="checkbox" id="numbers" checked> Chiffres</label><br>
    <label><input type="checkbox" id="symbols" checked> Symboles</label>
  </div>

  <button onclick="generatePassword()">Générer</button>
  <button onclick="copyPassword()">Copier</button>
</div>

<script>
const passwordEl = document.getElementById("password");
const lengthEl = document.getElementById("length");
const lengthValue = document.getElementById("lengthValue");

lengthEl.addEventListener("input", () => {
  lengthValue.textContent = lengthEl.value;
});

function generatePassword() {
  const lower = "abcdefghijklmnopqrstuvwxyz";
  const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const numbers = "0123456789";
  const symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?";

  let chars = lower;

  if (document.getElementById("uppercase").checked) chars += upper;
  if (document.getElementById("numbers").checked) chars += numbers;
  if (document.getElementById("symbols").checked) chars += symbols;

  let password = "";
  for (let i = 0; i < lengthEl.value; i++) {
    password += chars[Math.floor(Math.random() * chars.length)];
  }

  passwordEl.textContent = password;
}

function copyPassword() {
  navigator.clipboard.writeText(passwordEl.textContent);
  alert("Mot de passe copié !");
}
</script>

</body>
</html>
